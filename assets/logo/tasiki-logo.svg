        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wordmark -->
  <text x="104" y="62"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="700" letter-spacing="-1"
        fill="#1F2937">tasiki</text>
</svg>
